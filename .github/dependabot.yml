# Automated dependency updates. Dependabot opens PRs (which run CI) when newer versions or
# security fixes are available. See BueloWeb/CLAUDE.md for the commit/push policy.
version: 2
updates:
  # npm/pnpm packages (pnpm lockfile is supported).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    ignore:
      # monaco-editor is deliberately pinned to 0.54.x — 0.55 breaks monaco-yaml upstream
      # (monaco-worker-manager still calls monaco's removed createWebWorker). See CLAUDE.md.
      - dependency-name: "monaco-editor"
        versions: [">=0.55.0"]
    groups:
      # Batch Vue/Vite/Vitest tooling so version-aligned packages bump together.
      vue-vite:
        patterns:
          - "vue"
          - "vue-*"
          - "@vue/*"
          - "@vitejs/*"
          - "vite"
          - "vitest"
          - "@vitest/*"

  # The GitHub Actions used by the CI workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
