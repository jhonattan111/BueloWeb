name: Publish image

# Builds the web (nginx SPA) container and pushes it to GHCR:
#   - on a version tag `v*`  → semver tags (e.g. 1.2.3, 1.2, and `latest`)
#   - on push to master      → the `edge` tag (rolling latest-main)
# The image is public (the repo is public). Consumed by docker-compose (image: ghcr.io/<owner>/buelo-web).
#
# Note: the SPA bakes VITE_API_BASE_URL at build time. This image uses "" (same-origin) so the
# bundled nginx proxies /api, /ping, /health to the API — matching docker-compose.yml.
on:
  push:
    tags: ['v*']
    branches: [master]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/buelo-web

jobs:
  publish:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VITE_API_BASE_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
