server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — non-file routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend service (same-origin → no CORS needed).
    # "api" is the docker-compose service name.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /ping   { proxy_pass http://api:8080; }
    location = /health { proxy_pass http://api:8080; }
}
